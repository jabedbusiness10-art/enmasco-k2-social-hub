# ============================================================
# TASK-59.4 — NGINX reverse proxy for K2KAI Social Flow
# Place in /etc/nginx/sites-available/k2kai and symlink to sites-enabled.
# Run `nginx -t` then `systemctl reload nginx`.
# ============================================================

# Redirect all HTTP -> HTTPS (HSTS enforced at app layer too)
server {
    listen 80;
    server_name app.k2kai.com;
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

upstream k2kai_web {
    # PM2 cluster (or one container); add more as you scale.
    server 127.0.0.1:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=k2kai_api:10m rate=20r/s;

server {
    listen 443 ssl http2;
    server_name app.k2kai.com;

    ssl_certificate     /etc/letsencrypt/live/app.k2kai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.k2kai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;  # media uploads (TASK-54/55)

    # Security headers (app also sets them; nginx is defense-in-depth)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /api/ {
        limit_req zone=k2kai_api burst=40 nodelay;
        proxy_pass http://k2kai_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Messenger realtime bridge (Socket.IO) — websocket upgrade
    location /socket.io/ {
        proxy_pass http://k2kai_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://k2kai_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
