# ============================================================================
# K2KAI Social OS — NGINX reverse proxy (production)
# Domain: k2kai.enmasco.com  |  Upstream: pm2 "k2kai-web" on 127.0.0.1:3000
# ----------------------------------------------------------------------------
#  - HTTP -> HTTPS redirect
#  - TLS terminat (certbot / Let's Encrypt)
#  - Gzip + Brotli
#  - Long-cache for static assets (hashed Next.js build output)
#  - WebSocket upgrade (Socket.IO messenger bridge)
#  - Security headers (CSP/HSTS/etc are ALSO set in next.config.mjs; this is
#    defense-in-depth for anything proxied)
# ============================================================================

# Brotli (requires nginx-built-with-brotli or nginx-plus; otherwise remove block)
brotli on;
brotli_comp_level 6;
brotli_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

# Redirect all HTTP -> HTTPS
server {
    listen 80;
    server_name k2kai.enmasco.com;
    # Allow ACME challenge for certbot
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name k2kai.enmasco.com;

    # --- TLS (certbot-managed) ---
    ssl_certificate     /etc/letsencrypt/live/k2kai.enmasco.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/k2kai.enmasco.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS (already in app headers too; kept here for proxy-level guarantees)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy to Next.js (pm2)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (Socket.IO messenger bridge)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-polling / SSE fallbacks
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Service worker: never cache, must come from origin root
    location = /service-worker.js {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # PWA manifest
    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Long-cache Next.js static build chunks (content-hashed -> safe)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Media / uploads (local storage fallback)
    location /uploads/ {
        alias /var/www/k2kai/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }
}
